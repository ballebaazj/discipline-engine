<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Protocol v7 | 65KG Goal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #000; --card: #1c1c1e; --accent: #ff3b30; --blue: #0a84ff;
    --green: #34c759; --text: #fff; --muted: #8e8e93; --gold: #ffd60a;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding-bottom: 50px; }

header {
    position: sticky; top: 0; z-index: 1000;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
    padding: 20px; border-bottom: 0.5px solid #333;
}
.header-top { display: flex; justify-content: space-between; align-items: flex-end; }
h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
#ist-clock { font-family: 'IBM Plex Mono'; color: var(--accent); font-size: 13px; }

.container { padding: 15px; max-width: 500px; margin: 0 auto; }
.section-title { font-size: 11px; font-weight: 700; margin: 25px 0 10px 5px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }

.card { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
.val { font-size: 24px; font-weight: 700; }
.sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* --- INPUTS --- */
input, select, textarea { 
    width: 100%; background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 12px; 
    padding: 14px; color: white; font-size: 16px; margin-top: 5px; outline: none; font-family: inherit;
}
textarea { height: 80px; resize: none; font-size: 14px; }
.btn-main {
    width: 100%; background: var(--text); color: var(--bg); border: none;
    padding: 18px; border-radius: 16px; font-weight: 700; font-size: 16px; margin-top: 15px;
}
.locked-box { background: rgba(52, 199, 89, 0.1); border: 1px solid var(--green); color: var(--green); text-align: center; padding: 25px; border-radius: 16px; font-weight: 700; }

/* --- ARCHIVE (EXPANDABLE) --- */
details { background: var(--card); border-radius: 12px; margin-bottom: 8px; border: 1px solid #2c2c2e; overflow: hidden; }
summary { padding: 15px; font-size: 14px; font-weight: 600; cursor: pointer; list-style: none; display: flex; justify-content: space-between; }
summary::-webkit-details-marker { display: none; }
.history-content { padding: 0 15px 15px 15px; font-size: 13px; color: #d1d1d6; border-top: 0.5px solid #333; padding-top: 10px; }
.history-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
</style>
</head>
<body>

<header>
    <div class="header-top">
        <h1>Protocol HUD</h1>
        <div id="ist-clock">00:00:00 IST</div>
    </div>
    <div style="font-size: 12px; color: var(--muted); margin-top: 4px;">Tuesday, 3 March 2026</div>
</header>

<div class="container">
    
    <div class="section-title">Objective: 65.0kg @ 10% BF</div>
    <div class="card" style="border-left: 4px solid var(--blue);">
        <div class="grid-2">
            <div>
                <div class="label">Days to Goal</div>
                <div class="val" id="val-days">--</div>
                <div class="sub" id="val-eta">Calculating...</div>
            </div>
            <div>
                <div class="label">True TDEE</div>
                <div class="val" id="val-tdee">----</div>
                <div class="sub">7D Burn Rate</div>
            </div>
        </div>
    </div>

    <div class="section-title">Current Performance</div>
    <div class="grid-2">
        <div class="card">
            <div class="label" style="color:var(--accent)">7D Avg Weight</div>
            <div class="val" id="val-w">0.0</div>
            <div class="sub">kg (Rolling)</div>
        </div>
        <div class="card">
            <div class="label" style="color:var(--green)">Compliance</div>
            <div class="val" id="val-comp">0%</div>
            <div class="sub">10 Day Streak</div>
        </div>
    </div>

    <div class="section-title">Submission: Monday, March 2</div>
    <div class="card">
        <div id="form-ui">
            <div class="grid-2">
                <div><label>Weight (kg)</label><input type="number" id="in-w" step="0.1" placeholder="71.0"></div>
                <div><label>Intake (kcal)</label><input type="number" id="in-c" placeholder="2000"></div>
            </div>
            <div class="grid-2" style="margin-top:12px">
                <div><label>Steps</label><input type="number" id="in-s" placeholder="10000"></div>
                <div><label>Gym RPE</label>
                    <select id="in-rpe">
                        <option value="0">Rest</option>
                        <option value="7">Moderate (7)</option>
                        <option value="9">Maximum (9)</option>
                    </select>
                </div>
            </div>
            <div style="margin-top:12px">
                <label>Strategic Notes</label>
                <textarea id="in-notes" placeholder="Hunger levels, sleep quality, strength notes..."></textarea>
            </div>
            <button class="btn-main" onclick="executeLog()">Seal March 2 Protocol</button>
        </div>
        <div id="locked-ui" style="display:none" class="locked-box">
            ✓ MARCH 2 PROTOCOL SEALED
        </div>
    </div>

    <div class="section-title">Protocol Archive</div>
    <div id="history-container"></div>

    <button class="btn-main" style="background:#1c1c1e; color:#fff; border: 1px solid #333;" onclick="exportData()">Export Data Backup</button>
</div>

<script>
const YESTERDAY = "2026-03-02";
const GOAL_W = 65.0;

let db = JSON.parse(localStorage.getItem('engine_v7_db')) || [
    {date: "2026-02-21", w: 72.2, c: 2200, s: 8000, rpe: 8, notes: "Protocol Start. Feeling strong.", ts: "08:15 AM"},
    {date: "2026-02-22", w: 72.0, c: 2100, s: 7500, rpe: 0, notes: "Rest day. Slightly hungry.", ts: "07:30 AM"},
    {date: "2026-02-23", w: 72.1, c: 2300, s: 11000, rpe: 9, notes: "Heavy pull session. Weight spiked.", ts: "08:00 AM"},
    {date: "2026-02-24", w: 71.8, c: 2000, s: 10000, rpe: 7, notes: "Good energy throughout.", ts: "07:45 AM"},
    {date: "2026-02-25", w: 71.6, c: 2100, s: 9500, rpe: 0, notes: "Mid-week rest.", ts: "09:00 AM"},
    {date: "2026-02-26", w: 71.7, c: 2200, s: 12000, rpe: 8, notes: "Long walk today.", ts: "07:20 AM"},
    {date: "2026-02-27", w: 71.4, c: 2000, s: 10000, rpe: 8, notes: "Strength is holding well.", ts: "08:10 AM"},
    {date: "2026-02-28", w: 71.3, c: 2100, s: 8500, rpe: 0, notes: "Relaxed Saturday.", ts: "08:45 AM"},
    {date: "2026-03-01", w: 71.2, c: 1900, s: 11000, rpe: 9, notes: "Pushing the deficit.", ts: "07:55 AM"}
];

function updateClock() {
    const ist = new Date(new Date().getTime() + (new Date().getTimezoneOffset() * 60000) + (5.5 * 3600000));
    document.getElementById('ist-clock').textContent = ist.toTimeString().split(' ')[0] + " IST";
}
setInterval(updateClock, 1000); updateClock();

function render() {
    const sorted = [...db].sort((a,b) => b.date.localeCompare(a.date));
    const yesterdayEntry = sorted.find(d => d.date === YESTERDAY);

    if(yesterdayEntry && yesterdayEntry.w > 0) {
        document.getElementById('form-ui').style.display = 'none';
        document.getElementById('locked-ui').style.display = 'block';
    }

    const last7 = [...db].sort((a,b) => a.date.localeCompare(b.date)).slice(-7);
    const avgW = last7.reduce((s,d) => s + d.w, 0) / last7.length;
    const avgC = last7.reduce((s,d) => s + d.c, 0) / last7.length;
    
    // Metabolic Engine
    const wDelta = last7[last7.length-1].w - last7[0].w;
    const trueTDEE = avgC - ((wDelta * 7700) / 7);
    const deficit = trueTDEE - avgC;
    
    // Days to Goal: (Remaining Fat in kg * 7700) / daily deficit
    const remainingKg = sorted[0].w - GOAL_W;
    const daysToGoal = deficit > 0 ? Math.ceil((remainingKg * 7700) / deficit) : "---";

    document.getElementById('val-tdee').textContent = Math.round(trueTDEE);
    document.getElementById('val-days').textContent = daysToGoal;
    document.getElementById('val-w').textContent = avgW.toFixed(1);
    document.getElementById('val-comp').textContent = Math.min(100, Math.round((db.length / 10) * 100)) + "%";

    if(deficit > 0) {
        const etaDate = new Date();
        etaDate.setDate(etaDate.getDate() + daysToGoal);
        document.getElementById('val-eta').textContent = "ETA: " + etaDate.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
    }

    // Render Archive
    const histCont = document.getElementById('history-container');
    histCont.innerHTML = '';
    sorted.forEach(entry => {
        const det = document.createElement('details');
        det.innerHTML = `
            <summary>
                <span>${entry.date}</span>
                <span style="color:var(--accent)">${entry.w} kg</span>
            </summary>
            <div class="history-content">
                <div class="history-row"><span>Intake:</span> <span>${entry.c} kcal</span></div>
                <div class="history-row"><span>Steps:</span> <span>${entry.s}</span></div>
                <div class="history-row"><span>RPE:</span> <span>${entry.rpe}</span></div>
                <div class="history-row"><span>Time:</span> <span>${entry.ts || 'N/A'}</span></div>
                <div style="margin-top:8px; font-style:italic; color:var(--muted)">"${entry.notes || 'No notes.'}"</div>
            </div>
        `;
        histCont.appendChild(det);
    });
}

window.executeLog = function() {
    const w = parseFloat(document.getElementById('in-w').value);
    const c = parseInt(document.getElementById('in-c').value);
    if(!w || !c) return alert("Biometrics required.");
    
    const now = new Date();
    const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    db.push({
        date: YESTERDAY,
        w: w,
        c: c,
        s: parseInt(document.getElementById('in-s').value) || 0,
        rpe: parseInt(document.getElementById('in-rpe').value) || 0,
        notes: document.getElementById('in-notes').value,
        ts: timeStr
    });
    
    localStorage.setItem('engine_v7_db', JSON.stringify(db));
    render();
};

window.exportData = function() {
    const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = `protocol_v7_backup.json`; a.click();
};

render();
</script>
</body>
</html>
