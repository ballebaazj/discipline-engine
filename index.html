<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISCIPLINE ENGINE</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --card:#121212;
  --border:#1f1f1f;
  --text:#f0f0f0;
  --muted:#777;
  --accent:#e8ff47;
  --green:#47ff8c;
  --orange:#ffb347;
  --red:#ff4747;
  --mono:'IBM Plex Mono', monospace;
  --sans:'Inter', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans)}

header{
  position:sticky;
  top:0;
  background:var(--bg);
  padding:18px 24px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:100;
}

.logo{
  font-family:var(--mono);
  letter-spacing:.2em;
  color:var(--accent);
}

#mini{
  position:sticky;
  top:68px;
  background:#101010;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  padding:10px 24px;
  font-family:var(--mono);
  font-size:13px;
  z-index:90;
}

main{
  max-width:900px;
  margin:0 auto;
  padding:30px 20px;
}

.section{margin-bottom:40px}

.big-metric{
  font-family:var(--mono);
  font-size:48px;
  font-weight:600;
}

.sub-metric{
  font-family:var(--mono);
  color:var(--muted);
  font-size:13px;
}

.card{
  background:linear-gradient(180deg,#141414,#101010);
  border:1px solid rgba(255,255,255,0.04);
  padding:22px;
  margin-top:18px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:16px;
}

.label{
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted);
  margin-bottom:4px;
}

.value{
  font-family:var(--mono);
  font-size:20px;
}

.verdict{
  padding:6px 12px;
  border:1px solid;
  font-family:var(--mono);
  font-size:11px;
}

.optimal{color:var(--green);border-color:var(--green)}
.slow{color:var(--orange);border-color:var(--orange)}
.aggressive{color:var(--red);border-color:var(--red)}

input,select{
  width:100%;
  background:#0f0f0f;
  border:1px solid var(--border);
  color:var(--text);
  padding:10px;
  margin-top:8px;
  font-family:var(--mono);
}

button{
  background:var(--accent);
  border:none;
  padding:10px 16px;
  font-family:var(--mono);
  margin-top:14px;
  cursor:pointer;
}

hr{border:none;border-top:1px solid var(--border);margin:30px 0}
</style>
</head>
<body>

<div id="auth-screen">
  <div style="height:100vh;display:flex;align-items:center;justify-content:center;">
    <button onclick="signInWithGoogle()">CONTINUE WITH GOOGLE</button>
  </div>
</div>

<div id="app" style="display:none">

<header>
  <div class="logo">DISCIPLINE ENGINE</div>
  <button onclick="signOut()">SIGN OUT</button>
</header>

<div id="mini">
  <div id="mini-weight">—</div>
  <div id="mini-rate">—</div>
  <div id="mini-phase">—</div>
</div>

<main>

<section class="section">
  <div class="big-metric" id="display-weight">—</div>
  <div class="sub-metric" id="display-weekly">—</div>
  <div style="margin-top:12px" id="display-verdict"></div>
</section>

<section class="section card">
  <div class="grid" id="performance-grid"></div>
</section>

<section class="section card">
  <div class="label">LOG YESTERDAY</div>

  <input type="number" id="inp-weight" placeholder="Scale Weight (kg)">
  <input type="number" id="inp-cal" placeholder="Kcal Intake">
  <input type="number" id="inp-protein" placeholder="Protein (g)">
  <input type="number" id="inp-steps" placeholder="Steps">
  <input type="number" id="inp-sleep" placeholder="Sleep (hrs)">
  <input type="number" id="inp-gym" placeholder="Gym Rating (1-10)">
  <input type="number" id="inp-burn" placeholder="Kcal Burned">
  <select id="inp-macro">
    <option value="">Macro/Micro Complete?</option>
    <option value="yes">Yes</option>
    <option value="no">No</option>
  </select>

  <button onclick="submitLog()">Submit Log</button>
</section>

</main>
</div>

<script type="module">

/* 🔒 FIREBASE CONFIG — UNCHANGED */
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAk9apbcvCz6cHRVfkAMVpOn9t9Nv60FvE",
  authDomain: "discipline-engine-6cb32.firebaseapp.com",
  projectId: "discipline-engine-6cb32",
  storageBucket: "discipline-engine-6cb32.appspot.com",
  messagingSenderId: "772221095332",
  appId: "1:772221095332:web:a65d6cd7baf51613410531"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;
let allDays=[];
let phase="CUT";
let maintenanceEstimate=2200;

const PHASES={
  CUT:{deficit:450,rateMin:-0.7,rateMax:-0.3},
  MAINTENANCE:{deficit:0,rateMin:-0.1,rateMax:0.1},
  GAIN:{deficit:-200,rateMin:0.2,rateMax:0.5}
};

window.signInWithGoogle=async()=>await signInWithPopup(auth,new GoogleAuthProvider());
window.signOut=async()=>await fbSignOut(auth);

onAuthStateChanged(auth,user=>{
  if(user){
    currentUser=user;
    document.getElementById("auth-screen").style.display="none";
    document.getElementById("app").style.display="block";
    init();
  }else{
    document.getElementById("auth-screen").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

function avg(arr,key){
  const v=arr.filter(d=>d[key]>0);
  return v.length? v.reduce((s,d)=>s+d[key],0)/v.length:null;
}

function computeModel(){
  const sorted=[...allDays].sort((a,b)=>a.date.localeCompare(b.date));
  if(sorted.length<14) return null;

  const last7=sorted.slice(-7);
  const prev7=sorted.slice(-14,-7);

  const avgW=avg(last7,"weight");
  const avgPrev=avg(prev7,"weight");
  const weekly=((avgW-avgPrev)/avgPrev)*100;

  const avgCal=avg(last7,"calories");
  const weightDelta=sorted[sorted.length-1].weight - sorted[sorted.length-14].weight;
  maintenanceEstimate=avgCal - (weightDelta*7700/14);

  const target=maintenanceEstimate - PHASES[phase].deficit;

  let verdict="—",vClass="";
  if(weekly<PHASES[phase].rateMin){verdict="Too Aggressive";vClass="aggressive";}
  else if(weekly>PHASES[phase].rateMax){verdict="Too Slow";vClass="slow";}
  else{verdict="Optimal";vClass="optimal";}

  const compliance=Math.round(
    (last7.filter(d=>
      Math.abs(d.calories-target)<=target*.1 &&
      d.protein>=110 &&
      d.steps>=7000 &&
      d.sleep>=7
    ).length/7)*100
  );

  return {avgW,weekly,target,verdict,vClass,compliance};
}

function render(){
  const m=computeModel();
  if(!m) return;

  document.getElementById("display-weight").textContent=`${m.avgW.toFixed(1)} kg`;
  document.getElementById("display-weekly").textContent=`${m.weekly.toFixed(2)}% per week`;
  document.getElementById("display-verdict").innerHTML=
    `<span class="verdict ${m.vClass}">${m.verdict}</span>`;

  document.getElementById("mini-weight").textContent=`${m.avgW.toFixed(1)} kg`;
  document.getElementById("mini-rate").textContent=`${m.weekly.toFixed(2)}%`;
  document.getElementById("mini-phase").textContent=`PHASE: ${phase}`;

  document.getElementById("performance-grid").innerHTML=`
    <div><div class="label">Target Intake</div><div class="value">${m.target.toFixed(0)} kcal</div></div>
    <div><div class="label">Maintenance Est.</div><div class="value">${maintenanceEstimate.toFixed(0)} kcal</div></div>
    <div><div class="label">Compliance</div><div class="value">${m.compliance}%</div></div>
  `;
}

async function init(){
  const q=query(collection(db,"users",currentUser.uid,"days"),orderBy("date","asc"));
  onSnapshot(q,s=>{
    allDays=s.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
}

window.submitLog=async function(){
  const d=new Date();d.setDate(d.getDate()-1);
  const date=d.toISOString().slice(0,10);

  await setDoc(doc(db,"users",currentUser.uid,"days",date),{
    date,
    weight:+inpWeight.value||0,
    calories:+inpCal.value||0,
    protein:+inpProtein.value||0,
    steps:+inpSteps.value||0,
    sleep:+inpSleep.value||0,
    gym:+inpGym.value||0,
    burned:+inpBurn.value||0,
    macro:inpMacro.value==="yes",
    createdAt:serverTimestamp()
  },{merge:true});
};

</script>
</body>
</html>
