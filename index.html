<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISCIPLINE ENGINE</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0b0b;
  --card:#141414;
  --border:#222;
  --text:#e8e8e8;
  --muted:#777;
  --accent:#e8ff47;
  --green:#47ff8c;
  --orange:#ffb347;
  --red:#ff4747;
  --mono:'IBM Plex Mono', monospace;
  --sans:'IBM Plex Sans', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-size:14px;
}

header{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--bg);
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-family:var(--mono);
  letter-spacing:.2em;
  color:var(--accent);
}

#mini-status{
  position:sticky;
  top:60px;
  background:#101010;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  padding:8px 20px;
  font-family:var(--mono);
  font-size:12px;
  z-index:90;
}

main{
  max-width:900px;
  margin:0 auto;
  padding:20px;
}

.block{
  margin-bottom:28px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:20px;
}

.section-title{
  font-family:var(--mono);
  letter-spacing:.2em;
  font-size:11px;
  color:var(--muted);
  margin-bottom:14px;
  text-transform:uppercase;
}

.stat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}

.stat{
  background:#111;
  border:1px solid var(--border);
  padding:14px;
}

.stat .label{
  font-family:var(--mono);
  font-size:9px;
  color:var(--muted);
  margin-bottom:6px;
  letter-spacing:.15em;
}

.stat .value{
  font-family:var(--mono);
  font-size:20px;
}

.verdict{
  display:inline-block;
  padding:6px 12px;
  border:1px solid;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.15em;
}

.optimal{color:var(--green);border-color:var(--green)}
.slow{color:var(--orange);border-color:var(--orange)}
.aggressive{color:var(--red);border-color:var(--red)}

canvas{width:100%;height:200px;}

input{
  width:100%;
  background:#111;
  border:1px solid var(--border);
  color:var(--text);
  padding:8px;
  font-family:var(--mono);
  margin-top:4px;
}

button{
  background:var(--accent);
  border:none;
  padding:10px 18px;
  font-family:var(--mono);
  cursor:pointer;
  margin-top:10px;
}

details summary{
  cursor:pointer;
  font-family:var(--mono);
  color:var(--muted);
  margin-bottom:8px;
}
</style>
</head>
<body>

<div id="auth-screen">
  <div style="height:100vh;display:flex;align-items:center;justify-content:center;">
    <button onclick="signInWithGoogle()">CONTINUE WITH GOOGLE</button>
  </div>
</div>

<div id="app" style="display:none">

<header>
  <div class="logo">DISCIPLINE ENGINE</div>
  <button onclick="signOut()">SIGN OUT</button>
</header>

<div id="mini-status">
  <div id="mini-weight">—</div>
  <div id="mini-weekly">—</div>
  <div id="mini-verdict">—</div>
</div>

<main>

<!-- CURRENT STATE -->
<section class="block card">
  <div class="section-title">Current State</div>
  <div class="stat-grid" id="state-stats"></div>
</section>

<!-- TRAJECTORY -->
<section class="block card">
  <div class="section-title">Weight Trend (30 Days)</div>
  <canvas id="weight-chart"></canvas>
</section>

<!-- ENERGY & BEHAVIOR -->
<section class="block card">
  <div class="section-title">Energy & Compliance</div>
  <div class="stat-grid" id="energy-stats"></div>
</section>

<!-- TRAINING -->
<section class="block card">
  <div class="section-title">Training & PR</div>
  <div id="training-stats"></div>
</section>

<!-- LOG -->
<section class="block card">
  <div class="section-title">Log Yesterday</div>
  <input type="number" id="inp-weight" placeholder="Weight (kg)">
  <input type="number" id="inp-cal" placeholder="Calories">
  <input type="number" id="inp-protein" placeholder="Protein (g)">
  <input type="number" id="inp-steps" placeholder="Steps">
  <input type="number" id="inp-sleep" placeholder="Sleep (hrs)">
  <button onclick="submitLog()">Submit</button>
</section>

<!-- HISTORY -->
<section class="block card">
  <div class="section-title">History</div>
  <details>
    <summary>Show Logs</summary>
    <div id="history-list"></div>
  </details>
</section>

</main>
</div>

<script type="module">

/* 🔒 FIREBASE CONFIG — UNCHANGED */
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, orderBy, limit, serverTimestamp, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAk9apbcvCz6cHRVfkAMVpOn9t9Nv60FvE",
  authDomain: "discipline-engine-6cb32.firebaseapp.com",
  projectId: "discipline-engine-6cb32",
  storageBucket: "discipline-engine-6cb32.appspot.com",
  messagingSenderId: "772221095332",
  appId: "1:772221095332:web:a65d6cd7baf51613410531"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ───────────────────────── STATE */
let currentUser=null;
let allDays=[];
let calTarget=2150;

/* ───────────────────────── AUTH */
window.signInWithGoogle = async function(){
  const provider=new GoogleAuthProvider();
  await signInWithPopup(auth,provider);
}

window.signOut = async function(){
  await fbSignOut(auth);
}

onAuthStateChanged(auth,user=>{
  if(user){
    currentUser=user;
    document.getElementById("auth-screen").style.display="none";
    document.getElementById("app").style.display="block";
    initApp();
  }else{
    document.getElementById("auth-screen").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

/* ───────────────────────── INIT */
async function initApp(){
  const settingsDoc=await getDoc(doc(db,'users',currentUser.uid,'settings','prefs'));
  if(settingsDoc.exists()) calTarget=settingsDoc.data().calTarget||2150;

  const q=query(collection(db,'users',currentUser.uid,'days'),orderBy('date','asc'),limit(120));
  onSnapshot(q,snap=>{
    allDays=snap.docs.map(d=>({id:d.id,...d.data()}));
    refreshApp();
  });
}

/* ───────────────────────── MODEL */
function avg(arr,key){
  const v=arr.filter(d=>d[key]>0);
  return v.length? v.reduce((s,d)=>s+d[key],0)/v.length:null;
}

function computeDerived(){
  if(!allDays.length) return null;

  const sorted=[...allDays].sort((a,b)=>a.date.localeCompare(b.date));
  const last7=sorted.slice(-7);
  const last14=sorted.slice(-14);

  const avgWeight=avg(last7,'weight');
  const weeklyChange = (last14.length>=14)
    ? ((avg(last7,'weight') - avg(sorted.slice(-14,-7),'weight')) / avg(sorted.slice(-14,-7),'weight')) * 100
    : null;

  const avgCal=avg(last7,'calories');
  const deficit = avgCal? (calTarget-avgCal):null;

  let verdict="—", vClass="";
  if(weeklyChange!==null){
    if(weeklyChange>-0.2){ verdict="Too Slow"; vClass="slow";}
    else if(weeklyChange>=-0.6){ verdict="Optimal"; vClass="optimal";}
    else{ verdict="Aggressive"; vClass="aggressive";}
  }

  const compliance = last7.length
    ? Math.round((last7.filter(d=>
        d.calories && Math.abs(d.calories-calTarget)<=calTarget*.1 &&
        d.protein>=130 &&
        d.steps>=7000 &&
        d.sleep>=7
      ).length / last7.length)*100)
    : null;

  return {
    avgWeight,
    weeklyChange,
    avgCal,
    deficit,
    compliance,
    verdict,
    vClass
  };
}

/* ───────────────────────── RENDER */
function refreshApp(){
  const d=computeDerived();
  if(!d) return;

  document.getElementById("mini-weight").textContent=`${d.avgWeight?.toFixed(1) || "—"} kg`;
  document.getElementById("mini-weekly").textContent=d.weeklyChange? `${d.weeklyChange.toFixed(2)}%/wk`:"—";
  document.getElementById("mini-verdict").innerHTML=`<span class="verdict ${d.vClass}">${d.verdict}</span>`;

  document.getElementById("state-stats").innerHTML=`
    <div class="stat"><div class="label">7d Avg Weight</div><div class="value">${d.avgWeight?.toFixed(1) || "—"}</div></div>
    <div class="stat"><div class="label">Weekly %</div><div class="value">${d.weeklyChange?.toFixed(2) || "—"}%</div></div>
    <div class="stat"><div class="label">Compliance</div><div class="value">${d.compliance || "—"}%</div></div>
  `;

  document.getElementById("energy-stats").innerHTML=`
    <div class="stat"><div class="label">Avg Calories</div><div class="value">${d.avgCal?.toFixed(0) || "—"}</div></div>
    <div class="stat"><div class="label">Cal Target</div><div class="value">${calTarget}</div></div>
    <div class="stat"><div class="label">Est Deficit</div><div class="value">${d.deficit || "—"}</div></div>
  `;

  renderHistory();
}

/* ───────────────────────── HISTORY */
function renderHistory(){
  const sorted=[...allDays].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById("history-list").innerHTML=
    sorted.map(d=>`${d.date} — ${d.weight||"-"}kg<br>`).join('');
}

/* ───────────────────────── LOG */
window.submitLog=async function(){
  const date=new Date();
  date.setDate(date.getDate()-1);
  const prev=date.toISOString().slice(0,10);

  await setDoc(doc(db,'users',currentUser.uid,'days',prev),{
    date:prev,
    weight:parseFloat(inpWeight.value)||0,
    calories:parseInt(inpCal.value)||0,
    protein:parseInt(inpProtein.value)||0,
    steps:parseInt(inpSteps.value)||0,
    sleep:parseFloat(inpSleep.value)||0,
    createdAt:serverTimestamp()
  },{merge:true});
};

</script>
</body>
</html>
