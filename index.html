<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISCIPLINE CONTROL PANEL</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== BACKGROUND ===== */
body{
  margin:0;
  font-family:Roboto, sans-serif;
  background:linear-gradient(135deg,#2b65d9,#33cc66);
  background-size:400% 400%;
  animation:bgShift 20s ease infinite;
  color:#000;
}

@keyframes bgShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* ===== HEADER ===== */
.header{
  background:linear-gradient(#0055ff,#00cc66);
  padding:15px;
  border-bottom:4px solid #000;
  font-family:Orbitron;
  color:#fff;
  text-align:center;
}

.header h1{
  margin:0;
  font-size:28px;
  letter-spacing:2px;
}

.ticker{
  background:#000;
  color:#0f0;
  font-size:14px;
  padding:5px;
  overflow:hidden;
  white-space:nowrap;
}

.ticker span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 15s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}

/* ===== LAYOUT ===== */
.wrapper{
  display:grid;
  grid-template-columns:250px 1fr 300px;
  gap:10px;
  padding:10px;
}

/* ===== SIDEBAR ===== */
.sidebar{
  background:#fff;
  border:3px solid #000;
}

.sidebar div{
  padding:12px;
  border-bottom:2px solid #000;
  font-weight:bold;
  cursor:pointer;
}

.sidebar div:hover{
  background:#00cc66;
}

/* ===== MAIN GRID ===== */
.main{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:10px;
}

.card{
  background:#fff;
  border:3px solid #000;
}

.card-header{
  background:linear-gradient(#3399ff,#00cc66);
  padding:8px;
  font-weight:bold;
  border-bottom:2px solid #000;
}

.card-body{
  padding:15px;
  font-size:24px;
  font-weight:bold;
}

.status-good{color:#00aa00;}
.status-mid{color:#ffaa00;}
.status-bad{color:#cc0000;}

/* ===== RIGHT PANEL ===== */
.sidepanel{
  background:#fff;
  border:3px solid #000;
  padding:10px;
}

/* ===== HEATMAP ===== */
.heatmap{
  display:grid;
  grid-template-columns:repeat(15,1fr);
  gap:3px;
}

.cell{
  aspect-ratio:1/1;
  background:#ccc;
  border:1px solid #000;
}

.low{background:#ff4444;}
.mid{background:#ffaa00;}
.high{background:#00cc66;}

/* ===== RESPONSIVE ===== */
@media(max-width:1000px){
  .wrapper{
    grid-template-columns:200px 1fr;
  }
  .sidepanel{display:none;}
}

@media(max-width:700px){
  .wrapper{
    grid-template-columns:1fr;
  }
  .sidebar{order:2;}
}

button{
  padding:6px 10px;
  border:2px solid #000;
  background:#00cc66;
  font-weight:bold;
  cursor:pointer;
}

input{
  padding:5px;
  border:2px solid #000;
  margin-top:5px;
  width:100%;
}

</style>
</head>

<body>

<div class="header">
  <h1>DISCIPLINE CONTROL PANEL v1.0</h1>
</div>

<div class="ticker">
  <span id="tickerText">SYSTEM ACTIVE | TRACKING PERFORMANCE | DATA STREAM ONLINE</span>
</div>

<div class="wrapper">

  <div class="sidebar">
    <div>DASHBOARD</div>
    <div>MOVEMENT</div>
    <div>ENERGY</div>
    <div>RECOVERY</div>
    <div>COGNITIVE</div>
    <div>ANALYTICS</div>
  </div>

  <div class="main">
    <div class="card">
      <div class="card-header">CURRENT STREAK</div>
      <div class="card-body" id="currentStreak">0</div>
    </div>

    <div class="card">
      <div class="card-header">7 DAY AVG</div>
      <div class="card-body" id="avg7">0%</div>
    </div>

    <div class="card">
      <div class="card-header">30 DAY AVG</div>
      <div class="card-body" id="avg30">0%</div>
    </div>

    <div class="card">
      <div class="card-header">LIFETIME AVG</div>
      <div class="card-body" id="avgLifetime">0%</div>
    </div>

    <div class="card">
      <div class="card-header">CONSISTENCY INDEX</div>
      <div class="card-body" id="volatility">0</div>
    </div>

    <div class="card">
      <div class="card-header">LOG YESTERDAY</div>
      <div class="card-body">
        Gym <input type="checkbox" id="gym"><br>
        Sleep <input type="checkbox" id="sleep"><br>
        Questions <input type="number" id="questions">
        <button onclick="submitEntry()">SUBMIT</button>
      </div>
    </div>

  </div>

  <div class="sidepanel">
    <h3>YEAR HEATMAP</h3>
    <div class="heatmap" id="heatmap"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAk9apbcvCz6cHRVfkAMVpOn9t9Nv60FvE",
  authDomain: "discipline-engine-6cb32.firebaseapp.com",
  projectId: "discipline-engine-6cb32",
  storageBucket: "discipline-engine-6cb32.firebasestorage.app",
  messagingSenderId: "772221095332",
  appId: "1:772221095332:web:a65d6cd7baf51613410531"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const db = getFirestore(app);

let currentUser=null;
let allData=[];

onAuthStateChanged(auth, async user=>{
  if(user){
    currentUser=user;
    await loadAllData();
    renderAnalytics();
    renderHeatmap();
  }else{
    await signInWithPopup(auth,provider);
  }
});

async function loadAllData(){
  const snap=await getDocs(collection(db,"users",currentUser.uid,"days"));
  allData=[];
  snap.forEach(d=>allData.push(d.data()));
  allData.sort((a,b)=>a.timestamp-b.timestamp);
}

function average(arr){
  if(!arr.length)return 0;
  return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
}

function renderAnalytics(){
  const scores=allData.map(d=>d.percentage);
  const last7=scores.slice(-7);
  const last30=scores.slice(-30);

  avg7.innerText=average(last7)+"%";
  avg30.innerText=average(last30)+"%";
  avgLifetime.innerText=average(scores)+"%";

  let streak=0,longest=0;
  for(let s of scores){
    if(s>=80){streak++;longest=Math.max(longest,streak);}
    else streak=0;
  }
  currentStreak.innerText=streak;
}

function renderHeatmap(){
  heatmap.innerHTML="";
  allData.forEach(d=>{
    const cell=document.createElement("div");
    cell.classList.add("cell");
    if(d.percentage<50)cell.classList.add("low");
    else if(d.percentage<80)cell.classList.add("mid");
    else cell.classList.add("high");
    heatmap.appendChild(cell);
  });
}

window.submitEntry=async function(){
  const now=new Date();
  const y=new Date(now);y.setDate(y.getDate()-1);
  const key=y.toISOString().split("T")[0];

  let h=(gym.checked?3:0)+(sleep.checked?3:0);
  let q=parseInt(questions.value||0);
  let s=q<20?0:q<50?2:q<80?5:q<100?8:10;
  let percent=Math.round(((h/10)*0.5+(s/10)*0.5)*100);

  await setDoc(doc(db,"users",currentUser.uid,"days",key),{
    health:h,study:s,percentage:percent,timestamp:Date.now()
  });

  await loadAllData();
  renderAnalytics();
  renderHeatmap();
};
</script>

</body>
</html>
