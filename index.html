<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summary | Discipline Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #000000; --card: #1c1c1e; --accent: #ff3b30; 
    --green: #34c759; --text: #ffffff; --muted: #8e8e93;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding-bottom: 60px; }

/* --- HUD --- */
header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
    padding: 20px; border-bottom: 0.5px solid #333;
}
.header-top { display: flex; justify-content: space-between; align-items: flex-end; }
h1 { font-size: 34px; font-weight: 700; letter-spacing: -1px; }
#ist-clock { font-family: 'IBM Plex Mono'; color: var(--accent); font-size: 14px; font-weight: 600; }
.date-sub { color: var(--muted); font-size: 13px; text-transform: uppercase; margin-top: 4px; }

/* --- LAYOUT --- */
.container { padding: 15px; max-width: 500px; margin: 0 auto; }
.section-label { font-size: 20px; font-weight: 700; margin: 25px 0 15px 5px; }

/* --- CARDS --- */
.card {
    background: var(--card); border-radius: 12px;
    padding: 16px; margin-bottom: 12px;
}
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.card-header span { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.card-value { font-size: 32px; font-weight: 700; }
.card-unit { font-size: 16px; color: var(--muted); font-weight: 400; }
.card-footer { font-size: 13px; color: var(--muted); margin-top: 8px; border-top: 0.5px solid #333; padding-top: 8px; }

/* --- INPUT --- */
.input-field { margin-bottom: 15px; }
label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
input { 
    width: 100%; background: #2c2c2e; border: none; border-radius: 8px; 
    padding: 14px; color: white; font-size: 17px; outline: none;
}
.btn-save {
    width: 100%; background: var(--accent); color: white; border: none;
    padding: 16px; border-radius: 12px; font-weight: 700; font-size: 17px; margin-top: 10px;
}
.locked-box { 
    border: 1px solid var(--green); color: var(--green); 
    text-align: center; padding: 15px; border-radius: 12px; font-weight: 600;
}

/* --- MINI CHART --- */
.chart-container { display: flex; align-items: flex-end; gap: 4px; height: 30px; margin-top: 10px; }
.bar { background: #3a3a3c; width: 100%; border-radius: 2px; transition: height 0.3s; }
.bar.highlight { background: var(--accent); }
</style>
</head>
<body>

<header>
    <div class="header-top">
        <h1>Summary</h1>
        <div id="ist-clock">--:--:-- IST</div>
    </div>
    <div class="date-sub">Tuesday, 3 March 2026</div>
</header>

<div class="container">
    <div class="section-label">Performance Rings</div>
    
    <div class="card">
        <div class="card-header"><span style="color:var(--accent)">● Morning Weight</span></div>
        <div class="card-value" id="disp-w">0.0 <span class="card-unit">kg</span></div>
        <div class="chart-container" id="chart-w"></div>
        <div class="card-footer" id="footer-w">Trend: Calculating...</div>
    </div>

    <div class="card">
        <div class="card-header"><span style="color:#ff9f0a">● Energy Intake</span></div>
        <div class="card-value" id="disp-c">0 <span class="card-unit">kcal</span></div>
        <div class="card-footer" id="footer-c">Maintenance Est: --</div>
    </div>

    <div class="section-label">Log: March 2</div>
    
    <div class="card" id="input-card">
        <div id="form-ui">
            <div class="input-field">
                <label>WEIGHT (KG)</label>
                <input type="number" id="in-w" step="0.1" placeholder="00.0">
            </div>
            <div class="input-field">
                <label>INTAKE (KCAL)</label>
                <input type="number" id="in-c" placeholder="0000">
            </div>
            <button class="btn-save" onclick="saveData()">Save to Protocol</button>
        </div>
        <div id="locked-ui" style="display:none" class="locked-box">
            SYSTEM LOCKED: March 2 Data Finalized
        </div>
    </div>

    <div class="section-label">Consistency</div>
    <div class="card">
        <div class="card-header"><span style="color:var(--green)">● Compliance Score</span></div>
        <div class="card-value" id="disp-comp">0%</div>
        <div class="card-footer">Last 10 days of adherence</div>
    </div>
</div>

<script>
const YESTERDAY = "2026-03-02";

// --- SEEDED DATA (Feb 21 - March 1) ---
let dataStore = JSON.parse(localStorage.getItem('engine_v4_final')) || [
    {date: "2026-02-21", w: 82.5, c: 2400},
    {date: "2026-02-22", w: 82.3, c: 2300},
    {date: "2026-02-23", w: 82.4, c: 2500},
    {date: "2026-02-24", w: 82.1, c: 2200},
    {date: "2026-02-25", w: 81.8, c: 2150},
    {date: "2026-02-26", w: 81.9, c: 2400},
    {date: "2026-02-27", w: 81.6, c: 2100},
    {date: "2026-02-28", w: 81.4, c: 2200},
    {date: "2026-03-01", w: 81.1, c: 2000}
];

// --- IST CLOCK ---
function runClock() {
    const now = new Date();
    const ist = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (5.5 * 3600000));
    document.getElementById('ist-clock').textContent = ist.toTimeString().split(' ')[0] + " IST";
}
setInterval(runClock, 1000); runClock();

// --- CORE ENGINE ---
function refreshUI() {
    const sorted = [...dataStore].sort((a,b) => a.date.localeCompare(b.date));
    const loggedYesterday = sorted.some(d => d.date === YESTERDAY);

    if(loggedYesterday) {
        document.getElementById('form-ui').style.display = 'none';
        document.getElementById('locked-ui').style.display = 'block';
    }

    const last7 = sorted.slice(-7);
    const avgW = last7.reduce((s,d) => s + d.w, 0) / last7.length;
    const avgC = last7.reduce((s,d) => s + d.c, 0) / last7.length;

    // Maintenance Calculation
    const startW = sorted[0].w;
    const endW = sorted[sorted.length-1].w;
    const diffW = endW - startW;
    const dayCount = (new Date(sorted[sorted.length-1].date) - new Date(sorted[0].date)) / 86400000;
    const maint = avgC - ((diffW * 7700) / dayCount);

    // UI Updates
    document.getElementById('disp-w').innerHTML = `${avgW.toFixed(1)} <span class="card-unit">kg</span>`;
    document.getElementById('disp-c').innerHTML = `${avgC.toFixed(0)} <span class="card-unit">kcal</span>`;
    document.getElementById('footer-c').textContent = `Maintenance Est: ${Math.round(maint)} kcal`;
    document.getElementById('footer-w').textContent = `7D Trend: ${diffW < 0 ? '▼' : '▲'} ${Math.abs(diffW).toFixed(1)} kg`;

    // Bars
    const chart = document.getElementById('chart-w');
    chart.innerHTML = '';
    last7.forEach((d, i) => {
        const bar = document.createElement('div');
        bar.className = `bar ${i === last7.length-1 ? 'highlight' : ''}`;
        bar.style.height = ((d.w - 70) * 4) + 'px'; // Dynamic scaling
        chart.appendChild(bar);
    });

    const comp = Math.round((sorted.length / 10) * 100);
    document.getElementById('disp-comp').textContent = comp + "%";
}

window.saveData = function() {
    const w = parseFloat(document.getElementById('in-w').value);
    const c = parseInt(document.getElementById('in-c').value);
    if(!w || !c) return alert("Missing Data.");
    dataStore.push({date: YESTERDAY, w, c});
    localStorage.setItem('engine_v4_final', JSON.stringify(dataStore));
    refreshUI();
};

refreshUI();
</script>
</body>
</html>
