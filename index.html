<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discipline</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:linear-gradient(180deg,#0f1115,#1b1e26);
  font-family:'Inter',sans-serif;
  color:white;
}

header{
  padding:30px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  margin:0;
  font-size:26px;
  font-weight:800;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  font-weight:600;
  background:#4da3ff;
  color:white;
  cursor:pointer;
}

.container{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.06);
  border-radius:16px;
  padding:20px;
}

input[type="number"]{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
  margin-top:10px;
}

label{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

.meter{
  margin-top:20px;
  font-size:26px;
  font-weight:800;
  text-align:center;
}
</style>
</head>

<body>

<header>
  <h1>Discipline</h1>
  <button onclick="login()">Login</button>
</header>

<div class="container">

  <div class="card">
    <h2>Health</h2>
    <label>Gym <input type="checkbox" id="gym"></label>
    <label>Cardio <input type="checkbox" id="cardio"></label>
    <label>5L Water <input type="checkbox" id="water"></label>
    <label>150g Protein <input type="checkbox" id="protein"></label>
    <label>Sleep <input type="checkbox" id="sleep"></label>
  </div>

  <div class="card">
    <h2>Study</h2>
    <input type="number" id="questions" placeholder="Questions completed">
    <button onclick="submitEntry()" style="margin-top:15px;">Submit</button>
    <div class="meter" id="scoreDisplay">0%</div>
  </div>

</div>

<!-- Firebase Module -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAk9apbcvCz6cHRVfkAMVpOn9t9Nv60FvE",
  authDomain: "discipline-engine-6cb32.firebaseapp.com",
  projectId: "discipline-engine-6cb32",
  storageBucket: "discipline-engine-6cb32.firebasestorage.app",
  messagingSenderId: "772221095332",
  appId: "1:772221095332:web:a65d6cd7baf51613410531"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const db = getFirestore(app);

let currentUser = null;

async function login(){
  const result = await signInWithPopup(auth, provider);
  currentUser = result.user;
  alert("Logged in as " + currentUser.email);
  await loadLatestDay();
}

async function saveDay(dateKey, data){
  if(!currentUser){
    alert("Login first");
    return;
  }

  await setDoc(
    doc(db, "users", currentUser.uid, "days", dateKey),
    data
  );
}

async function loadLatestDay(){
  if(!currentUser) return;

  const now = new Date();
  const yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - 1);
  const key = yesterday.toISOString().split("T")[0];

  const snap = await getDoc(
    doc(db, "users", currentUser.uid, "days", key)
  );

  if(snap.exists()){
    const data = snap.data();
    document.getElementById("scoreDisplay").innerText = data.percentage + "%";
  }
}

window.login = login;
window.saveDay = saveDay;
</script>

<!-- Main App Logic -->
<script>

function formatDate(d){
  return d.toISOString().split("T")[0];
}

function calculateHealth(){
  let s=0;
  if(gym.checked)s+=3;
  if(sleep.checked)s+=3;
  if(cardio.checked)s+=2;
  if(protein.checked)s+=1;
  if(water.checked)s+=1;
  return s;
}

function calculateStudy(q){
  if(q<20)return 0;
  if(q<50)return 2;
  if(q<80)return 5;
  if(q<100)return 8;
  return 10;
}

function weightedPercentage(h,s){
  return Math.round(((h/10)*0.5+(s/10)*0.5)*100);
}

async function submitEntry(){
  const now=new Date();
  const yesterday=new Date(now);
  yesterday.setDate(yesterday.getDate()-1);
  const key=formatDate(yesterday);

  const h=calculateHealth();
  const q=parseInt(questions.value||0);
  const s=calculateStudy(q);
  const percent=weightedPercentage(h,s);

  await saveDay(key,{
    health:h,
    study:s,
    percentage:percent,
    timestamp:Date.now()
  });

  scoreDisplay.innerText=percent+"%";
}

</script>

</body>
</html>
