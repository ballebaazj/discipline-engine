<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISCIPLINE ENGINE // V3</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050505; --card:#0f0f0f; --border:#222; --text:#e0e0e0;
  --muted:#555; --accent:#ccff00; --green:#00ff41; --orange:#ff9900; --red:#ff3131;
  --mono:'IBM Plex Mono', monospace;
}

*{box-sizing:border-box; margin:0; padding:0; cursor: crosshair;}
body{background:var(--bg); color:var(--text); font-family:var(--mono); overflow-x:hidden;}

/* Scanline Effect */
body::before {
  content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  z-index: 200; background-size: 100% 2px, 3px 100%; pointer-events: none;
}

header{
  padding:20px; border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
  background: rgba(5,5,5,0.8); backdrop-filter: blur(10px);
}

.status-tag { font-size: 10px; padding: 2px 6px; border: 1px solid var(--accent); color: var(--accent); text-transform: uppercase; }

main{ max-width:800px; margin:0 auto; padding:40px 20px; }

/* Dashboard HUD */
.hud-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 40px; }
.big-metric-box { border-left: 4px solid var(--accent); padding-left: 20px; }
.big-weight { font-size: 64px; font-weight: 600; letter-spacing: -2px; line-height: 1; }
.weekly-delta { color: var(--muted); font-size: 14px; margin-top: 5px; }

.card{
  background:var(--card); border:1px solid var(--border); padding:24px; position: relative;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card::after { content: ""; position: absolute; top: -1px; left: -1px; width: 10px; height: 10px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }

/* Input Protocol */
.input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
label { font-size: 9px; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 5px; }
input, select {
  width:100%; background:#000; border:1px solid #333; color:var(--accent);
  padding:12px; font-family:var(--mono); font-size: 16px; outline:none; transition: 0.2s;
}
input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(204, 255, 0, 0.2); }
input:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--muted); }

.btn-main {
  width: 100%; background: var(--accent); color: #000; border: none; padding: 18px;
  font-family: var(--mono); font-weight: 700; margin-top: 20px; transition: 0.3s;
}
.btn-main:hover:not(:disabled) { background: #fff; transform: translateY(-2px); }
.btn-main:disabled { background: var(--muted); color: #222; }

.verdict-stamp { 
  display: inline-block; margin-top: 15px; padding: 4px 12px; font-weight: 700; border: 2px solid; text-transform: uppercase; transform: rotate(-2deg);
}

#log-status-msg { font-size: 12px; margin-top: 10px; text-align: center; }

@media (max-width: 600px) { .hud-grid { grid-template-columns: 1fr; } .input-group { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="auth-screen" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
  <div style="font-size: 24px; margin-bottom: 20px; color: var(--accent);">[ SYSTEM LOCKED ]</div>
  <button class="btn-main" onclick="signInWithGoogle()" style="width:auto; padding: 15px 40px;">INITIALIZE AUTH</button>
</div>

<div id="app" style="display:none">
  <header>
    <div class="logo">DISCIPLINE_ENGINE // <span id="sys-date"></span></div>
    <button onclick="signOut()" style="background:none; border:none; color:var(--muted); font-family:var(--mono); font-size:10px;">[ DISCONNECT ]</button>
  </header>

  <main>
    <div class="hud-grid">
      <div class="big-metric-box">
        <div class="label">Rolling 7D Avg</div>
        <div class="big-weight" id="display-weight">00.0</div>
        <div class="weekly-delta" id="display-weekly">WAITING FOR BIOMETRICS...</div>
        <div id="display-verdict"></div>
      </div>
      
      <div class="card" style="padding: 15px;">
        <div class="label">Engine State</div>
        <select id="phase-selector" onchange="updatePhase(this.value)">
          <option value="CUT">PROTOCOL: CUT</option>
          <option value="MAINTENANCE">PROTOCOL: MAINTAIN</option>
          <option value="GAIN">PROTOCOL: GAIN</option>
        </select>
        <div style="margin-top:15px;" id="mini-stats"></div>
      </div>
    </div>

    <section class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="label" style="color:var(--text)">Input Yesterday's Performance</div>
        <div id="target-date-label" class="status-tag"></div>
      </div>

      <div class="input-group" id="input-container">
        <div><label>Weight (kg)</label><input type="number" id="inp-weight" step="0.1" placeholder="00.0"></div>
        <div><label>Energy (kcal)</label><input type="number" id="inp-cal" placeholder="0000"></div>
        <div><label>Protein (g)</label><input type="number" id="inp-protein" placeholder="000"></div>
        <div><label>Steps</label><input type="number" id="inp-steps" placeholder="00000"></div>
      </div>
      
      <button id="submit-btn" class="btn-main" onclick="submitLog()">EXECUTE LOG</button>
      <div id="log-status-msg"></div>
    </section>
  </main>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, collection, query, orderBy, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

/* CONFIG SAME AS BEFORE */
const firebaseConfig = {
  apiKey: "AIzaSyAk9apbcvCz6cHRVfkAMVpOn9t9Nv60FvE",
  authDomain: "discipline-engine-6cb32.firebaseapp.com",
  projectId: "discipline-engine-6cb32",
  storageBucket: "discipline-engine-6cb32.appspot.com",
  messagingSenderId: "772221095332",
  appId: "1:772221095332:web:a65d6cd7baf51613410531"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let allDays = [];
let currentPhase = "CUT";

// Date Logic for "Strict Yesterday"
const today = new Date();
const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
const yesterdayStr = yesterday.toLocaleDateString('en-CA'); // YYYY-MM-DD

document.getElementById('sys-date').textContent = today.toLocaleDateString('en-GB').split('/').join('.');
document.getElementById('target-date-label').textContent = `TARGETING: ${yesterdayStr}`;

const PHASES = {
  CUT: { deficit: 450, rateMin: -0.7, rateMax: -0.3 },
  MAINTENANCE: { deficit: 0, rateMin: -0.1, rateMax: 0.1 },
  GAIN: { deficit: -200, rateMin: 0.2, rateMax: 0.5 }
};

window.signInWithGoogle = async () => await signInWithPopup(auth, new GoogleAuthProvider());
window.signOut = async () => await fbSignOut(auth);

onAuthStateChanged(auth, user => {
  if(user){
    currentUser = user;
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    init();
  } else {
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

window.updatePhase = (val) => { currentPhase = val; render(); };

function init() {
  const q = query(collection(db, "users", currentUser.uid, "days"), orderBy("date", "asc"));
  onSnapshot(q, s => {
    allDays = s.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
}

function render() {
  const sorted = [...allDays].sort((a,b) => a.date.localeCompare(b.date));
  const hasLoggedYesterday = sorted.some(d => d.date === yesterdayStr);
  
  // LOCK MECHANISM
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('log-status-msg');
  const inputs = document.querySelectorAll('#input-container input');

  if (hasLoggedYesterday) {
    btn.disabled = true;
    btn.textContent = "LOG COMPLETED";
    msg.innerHTML = `<span style="color:var(--green)">✓ Biometrics synced for ${yesterdayStr}. No further changes allowed.</span>`;
    inputs.forEach(i => i.disabled = true);
  }

  if (sorted.length < 3) {
    document.getElementById('display-weight').textContent = "---";
    return;
  }

  // Logic for calculations (Simplified for display)
  const latestAvg = getRollingAvg(sorted, "weight", 7);
  const prevAvg = getRollingAvg(sorted.slice(0, -7), "weight", 7);
  const rate = prevAvg ? ((latestAvg - prevAvg) / prevAvg) * 100 : 0;

  document.getElementById('display-weight').textContent = latestAvg.toFixed(1);
  document.getElementById('display-weekly').textContent = `${rate.toFixed(2)}% WEEKLY SHIFT`;
  
  // HUD Info
  document.getElementById('mini-stats').innerHTML = `
    <div class="label">Compliance</div><div style="font-size:18px; color:var(--accent)">${calculateCompliance(sorted)}%</div>
    <div class="label" style="margin-top:10px">Records</div><div style="font-size:18px;">${sorted.length}</div>
  `;
}

function getRollingAvg(arr, key, days) {
  const subset = arr.slice(-days).map(d => d[key]).filter(v => v > 0);
  return subset.length ? subset.reduce((a,b) => a+b, 0) / subset.length : 0;
}

function calculateCompliance(arr) {
  const last7 = arr.slice(-7);
  if (!last7.length) return 0;
  const count = last7.filter(d => d.calories > 0 && d.protein > 100).length;
  return Math.round((count / last7.length) * 100);
}

window.submitLog = async function() {
  const weight = parseFloat(document.getElementById('inp-weight').value);
  const cals = parseInt(document.getElementById('inp-cal').value);
  const prot = parseInt(document.getElementById('inp-protein').value);
  const steps = parseInt(document.getElementById('inp-steps').value);

  if (!weight || !cals) return alert("Biometric failure: Weight and Calories required.");

  try {
    await setDoc(doc(db, "users", currentUser.uid, "days", yesterdayStr), {
      date: yesterdayStr, weight, calories: cals, protein: prot, steps,
      createdAt: serverTimestamp()
    });
  } catch (e) { console.error(e); }
};

</script>
</body>
</html>
