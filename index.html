<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discipline Engine</title>

<style>
body{
  margin:0;
  background:#0e0e11;
  color:#f2f2f2;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}
.card{
  background:#17171c;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}
h1{margin-bottom:30px;}
h2{margin-bottom:10px;}
input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #333;
  background:#1e1e24;
  color:white;
}
button{
  padding:12px;
  border:none;
  border-radius:8px;
  background:#c1121f;
  color:white;
  font-weight:600;
  cursor:pointer;
}
button:disabled{opacity:.4}
.row{
  display:flex;
  gap:10px;
}
.row input{flex:1}
.stat{
  font-size:14px;
  margin-bottom:5px;
}
.good{color:#4caf50}
.bad{color:#ff5252}
.neutral{color:#aaa}
</style>

</head>
<body>
<div class="container">

<h1>Discipline Engine</h1>

<div id="authSection" class="card">
  <button id="loginBtn">Sign in with Google</button>
</div>

<div id="app" style="display:none">

<div class="card">
  <h2 id="logTitle"></h2>
  <div id="statusMsg" class="stat"></div>
</div>

<div class="card">
  <h2>Daily Entry</h2>
  <input type="number" id="weight" placeholder="Weight (kg)">
  <input type="number" id="calories" placeholder="Calories">
  <input type="number" id="protein" placeholder="Protein (g)">
  <input type="number" id="steps" placeholder="Steps">
  <input type="number" id="sleep" placeholder="Sleep (hours)">
  <button id="submitBtn">Submit Day</button>
</div>

<div class="card">
  <h2>Weekly Metrics</h2>
  <input type="number" id="waist" placeholder="Waist (cm)">
  <div class="row">
    <input type="number" id="bench" placeholder="Bench (kg)">
    <input type="number" id="squat" placeholder="Squat (kg)">
  </div>
</div>

<div class="card">
  <h2>Body Composition</h2>
  <div id="bfStat" class="stat"></div>
  <div id="fatStat" class="stat"></div>
  <div id="leanStat" class="stat"></div>
  <div id="projectionStat" class="stat"></div>
</div>

<div class="card">
  <h2>15-Day Photo Upload</h2>
  <input type="file" id="photoInput">
  <button id="uploadPhotoBtn">Upload Photo</button>
  <div id="photoStatus" class="stat"></div>
</div>

</div>
</div>

<script type="module">

// Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAk9apbcvCz6cHRVfkAMVpOn9t9Nv60FvE",
  authDomain: "discipline-engine-6cb32.firebaseapp.com",
  projectId: "discipline-engine-6cb32",
  storageBucket: "discipline-engine-6cb32.appspot.com",
  messagingSenderId: "772221095332",
  appId: "1:772221095332:web:a65d6cd7baf51613410531"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let serverToday = new Date().toISOString().split("T")[0];
let yesterday = new Date(Date.now()-86400000).toISOString().split("T")[0];

function navyBF(weight, waist, neck, height=169){
  if(!waist || !neck) return null;
  return 86.010*Math.log10(waist-neck)-70.041*Math.log10(height)+36.76;
}

function updateBodyComp(weight, waist){
  const neck = 40;
  const bf = navyBF(weight, waist, neck);
  if(!bf) return;
  const fatMass = weight*(bf/100);
  const leanMass = weight-fatMass;
  document.getElementById("bfStat").innerText="Body Fat: "+bf.toFixed(1)+"%";
  document.getElementById("fatStat").innerText="Fat Mass: "+fatMass.toFixed(1)+" kg";
  document.getElementById("leanStat").innerText="Lean Mass: "+leanMass.toFixed(1)+" kg";

  const goalBF=12;
  const monthsLeft=14;
  const neededLoss=(bf-goalBF);
  document.getElementById("projectionStat").innerText=
    "Needed BF reduction: "+neededLoss.toFixed(1)+"% over ~"+monthsLeft+" months";
}

async function autoZero(){
  const dayRef = doc(db,"users",currentUser.uid,"days",yesterday);
  const snap = await getDoc(dayRef);
  if(!snap.exists()){
    await setDoc(dayRef,{
      zero:true,
      locked:true,
      createdAt:serverTimestamp()
    });
  }
}

async function loadDay(){
  document.getElementById("logTitle").innerText="Log for: "+yesterday;
  const dayRef = doc(db,"users",currentUser.uid,"days",yesterday);
  const snap = await getDoc(dayRef);
  if(snap.exists()){
    document.getElementById("statusMsg").innerText="Locked ✓";
    document.getElementById("submitBtn").disabled=true;
  }else{
    document.getElementById("statusMsg").innerText="Pending Entry";
    document.getElementById("submitBtn").disabled=false;
  }
}

document.getElementById("submitBtn").onclick=async()=>{
  const weight=parseFloat(weight.value);
  const calories=parseInt(calories.value);
  const protein=parseInt(protein.value);
  const steps=parseInt(steps.value);
  const sleep=parseFloat(sleep.value);
  const waistVal=parseFloat(waist.value);

  const dayRef = doc(db,"users",currentUser.uid,"days",yesterday);
  const snap = await getDoc(dayRef);
  if(snap.exists()) return;

  await setDoc(dayRef,{
    weight,calories,protein,steps,sleep,
    waist:waistVal,
    lifts:{
      bench:parseFloat(bench.value)||0,
      squat:parseFloat(squat.value)||0
    },
    zero:false,
    locked:true,
    createdAt:serverTimestamp()
  });

  updateBodyComp(weight,waistVal);
  loadDay();
};

document.getElementById("uploadPhotoBtn").onclick=async()=>{
  const file=document.getElementById("photoInput").files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=async function(){
    await setDoc(doc(db,"users",currentUser.uid,"photos",yesterday),{
      image:reader.result,
      createdAt:serverTimestamp()
    });
    document.getElementById("photoStatus").innerText="Photo Uploaded ✓";
  };
  reader.readAsDataURL(file);
};

document.getElementById("loginBtn").onclick=()=>{
  const provider=new GoogleAuthProvider();
  signInWithPopup(auth,provider);
};

onAuthStateChanged(auth,async(user)=>{
  if(user){
    currentUser=user;
    document.getElementById("authSection").style.display="none";
    document.getElementById("app").style.display="block";
    await autoZero();
    loadDay();
  }
});

</script>
</body>
</html>
