<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discipline Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Inter',sans-serif;
}

.header{
  padding:20px;
}

.time{
  font-size:32px;
  font-weight:800;
}

.date{
  opacity:0.6;
}

.card{
  background:linear-gradient(145deg,#111,#1c1c1e);
  border-radius:25px;
  padding:20px;
  margin:15px;
}

.card-title{
  font-weight:600;
  opacity:0.7;
}

.metric{
  font-size:28px;
  font-weight:800;
  margin-top:8px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:0 15px;
}

@media(max-width:700px){
  .grid{
    grid-template-columns:1fr;
  }
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#2c2c2e;
  color:#fff;
}

button{
  margin-top:15px;
  padding:10px 15px;
  border:none;
  border-radius:12px;
  background:#ff2d55;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.ring{
  width:160px;
  height:160px;
  border-radius:50%;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:800;
}
</style>
</head>

<body>

<div class="header">
  <div class="time" id="clock">--:--:--</div>
  <div class="date" id="dateText"></div>
</div>

<div class="card">
  <div class="card-title">Activity Score</div>
  <div class="ring" id="activityRing">0%</div>
</div>

<div class="grid">

  <div class="card">
    <div class="card-title">Health Score</div>
    <div class="metric" id="healthScore">0</div>
  </div>

  <div class="card">
    <div class="card-title">Study Score</div>
    <div class="metric" id="studyScore">0</div>
  </div>

  <div class="card">
    <div class="card-title">7 Day Average</div>
    <div class="metric" id="avg7">0%</div>
  </div>

  <div class="card">
    <div class="card-title">Current Streak</div>
    <div class="metric" id="streak">0</div>
  </div>

</div>

<div class="card">
  <div class="card-title">Log Yesterday</div>
  Gym <input type="checkbox" id="gym">
  Sleep <input type="checkbox" id="sleep">
  Questions Solved <input type="number" id="questions">
  <button onclick="submitEntry()">Save</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAk9apbcvCz6cHRVfkAMVpOn9t9Nv60FvE",
  authDomain: "discipline-engine-6cb32.firebaseapp.com",
  projectId: "discipline-engine-6cb32",
  storageBucket: "discipline-engine-6cb32.firebasestorage.app",
  messagingSenderId: "772221095332",
  appId: "1:772221095332:web:a65d6cd7baf51613410531"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const db = getFirestore(app);

let currentUser=null;
let allData=[];

onAuthStateChanged(auth, async user=>{
  if(user){
    currentUser=user;
    await loadData();
    renderAnalytics();
  } else {
    await signInWithPopup(auth,provider);
  }
});

async function loadData(){
  const snap=await getDocs(collection(db,"users",currentUser.uid,"days"));
  allData=[];
  snap.forEach(d=>allData.push(d.data()));
  allData.sort((a,b)=>a.timestamp-b.timestamp);
}

function average(arr){
  if(!arr.length)return 0;
  return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
}

function renderAnalytics(){
  const scores=allData.map(d=>d.percentage);
  const last7=scores.slice(-7);

  avg7.innerText=average(last7)+"%";

  let streakCount=0;
  for(let i=scores.length-1;i>=0;i--){
    if(scores[i]>=80) streakCount++;
    else break;
  }
  streak.innerText=streakCount;

  if(scores.length){
    const latest=allData[allData.length-1];
    healthScore.innerText=latest.health;
    studyScore.innerText=latest.study;
    updateRing(latest.percentage);
  }
}

function updateRing(percent){
  activityRing.style.background=
  `conic-gradient(#ff2d55 ${percent*3.6}deg, #222 ${percent*3.6}deg)`;
  activityRing.innerText=percent+"%";
}

window.submitEntry=async function(){
  const now=new Date();
  const y=new Date(now);
  y.setDate(y.getDate()-1);
  const key=y.toISOString().split("T")[0];

  let h=(gym.checked?3:0)+(sleep.checked?3:0);
  let q=parseInt(questions.value||0);
  let s=q<20?0:q<50?2:q<80?5:q<100?8:10;
  let percent=Math.round(((h/10)*0.5+(s/10)*0.5)*100);

  await setDoc(doc(db,"users",currentUser.uid,"days",key),{
    health:h,study:s,percentage:percent,timestamp:Date.now()
  });

  await loadData();
  renderAnalytics();
};
</script>

<script>
function updateClock(){
  const now=new Date();
  document.getElementById("clock").innerText=
    now.toLocaleTimeString();
  document.getElementById("dateText").innerText=
    now.toDateString();
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
